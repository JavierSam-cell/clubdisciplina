{% extends 'base.html' %}
{% block titulo %}Compartir receta{% endblock %}
{% block contenido %}
<div class="tarjeta">
    <h1>Comparte tu receta</h1>
    <p style="color:#555;">Se revisará antes de publicarse para todo el club.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for campo in form %}
        <p><label>{{ campo.label }}</label>{{ campo }}{{ campo.errors }}</p>
        {% endfor %}
        <button class="boton" type="submit" style="width:100%;">Enviar receta</button>
    </form>
</div>
{% endblock %}
